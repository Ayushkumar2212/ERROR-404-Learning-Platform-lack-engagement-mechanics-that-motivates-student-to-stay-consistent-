<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARN·XP | Gamified Student Growth</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #070b18; color: white; font-family: 'Nunito', sans-serif; overflow-x: hidden; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes rankUp { 
            0% { transform: scale(0.5); opacity: 0; } 
            20% { transform: scale(1.2); opacity: 1; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #00f5c4; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const PALETTE = {
            bg: '#070b18',
            teal: '#00f5c4',
            blue: '#0086ff',
            danger: '#ff4d6d',
            warning: '#ff9a3c',
            card: '#0f172a',
            textDim: '#94a3b8'
        };

        const MOCK_ACTIVITIES = [
            "Sofia earned 50 XP in Calculus",
            "Kai unlocked 'Early Bird' Badge",
            "Diana reached Rank #2 in Science",
            "Muna solved a Hard MCQ in History",
            "Zane just started a Daily Challenge",
            "Elena earned 75 XP in Physics"
        ];

        const INITIAL_LEADERBOARD = [
            { name: "Sofia Chen", xp: 4500, avatar: "SC", color: "#f43f5e" },
            { name: "Kai Miller", xp: 4100, avatar: "KM", color: "#3b82f6" },
            { name: "Diana Prince", xp: 3800, avatar: "DP", color: "#10b981" },
            { name: "Aman Singh", xp: 3240, avatar: "AS", color: "#00f5c4", current: true },
            { name: "Muna Khalid", xp: 2900, avatar: "MK", color: "#f59e0b" },
            { name: "Zane Gray", xp: 2500, avatar: "ZG", color: "#8b5cf6" }
        ];

        const INITIAL_SUBJECTS = [
            { name: "Math", score: 80, color: PALETTE.blue },
            { name: "Science", score: 40, color: PALETTE.danger },
            { name: "History", score: 65, color: PALETTE.warning },
            { name: "English", score: 72, color: PALETTE.teal },
            { name: "Physics", score: 55, color: PALETTE.warning }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('DASHBOARD');
            const [xp, setXp] = useState(3240);
            const [streak, setStreak] = useState(12);
            const [level, setLevel] = useState(7);
            const [rank, setRank] = useState(4);
            const [prevRank, setPrevRank] = useState(4);
            const [showRankBanner, setShowRankBanner] = useState(false);
            const [subjects, setSubjects] = useState(INITIAL_SUBJECTS);
            const [feed, setFeed] = useState(["Sofia earned 50 XP in Calculus", "Kai unlocked 'Early Bird' Badge"]);
            const [toast, setToast] = useState({ show: false, msg: '' });
            const [dailyDone, setDailyDone] = useState(false);
            const [activeQuest, setActiveQuest] = useState(null);
            const [loadingQuest, setLoadingQuest] = useState(false);

            // 10s Activity Loop
            useEffect(() => {
                const interval = setInterval(() => {
                    const random = MOCK_ACTIVITIES[Math.floor(Math.random() * MOCK_ACTIVITIES.length)];
                    setFeed(prev => [random, ...prev.slice(0, 4)]);
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            // Rank logic (Simulation)
            useEffect(() => {
                if (rank !== prevRank) {
                    setShowRankBanner(true);
                    const timer = setTimeout(() => {
                        setShowRankBanner(false);
                        setPrevRank(rank);
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [rank]);

            const handleAwardXP = (amount, msg) => {
                const oldXp = xp;
                setXp(xp + amount);
                setToast({ show: true, msg: `+${amount} XP: ${msg}` });
                setTimeout(() => setToast({ show: false, msg: '' }), 3500);

                // Simulate Rank change logic
                if (Math.random() > 0.5) {
                    setRank(Math.max(1, rank - 1));
                }
            };

            const weakestSubject = useMemo(() => subjects.reduce((prev, curr) => (prev.score < curr.score) ? prev : curr), [subjects]);

            // Styles
            const styles = {
                container: { padding: '2rem', maxWidth: '1200px', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: '2rem' },
                header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' },
                logo: { fontFamily: 'Orbitron', fontSize: '2.5rem', fontWeight: '900', color: PALETTE.teal, textShadow: `0 0 10px ${PALETTE.teal}44` },
                nav: { display: 'flex', gap: '1rem', background: '#ffffff11', padding: '0.5rem', borderRadius: '1rem' },
                navBtn: (active) => ({ 
                    padding: '0.8rem 1.5rem', borderRadius: '0.7rem', border: 'none', cursor: 'pointer', 
                    fontWeight: '700', fontFamily: 'Orbitron', fontSize: '0.9rem',
                    background: active ? PALETTE.teal : 'transparent',
                    color: active ? PALETTE.bg : 'white',
                    transition: 'all 0.3s ease'
                }),
                grid: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1.5rem' },
                card: { background: PALETTE.card, border: '1px solid #ffffff1a', borderRadius: '1.5rem', padding: '1.8rem', animation: 'slideIn 0.5s ease-out' },
                statLabel: { fontSize: '0.8rem', fontWeight: '700', textTransform: 'uppercase', color: PALETTE.textDim, letterSpacing: '1px' },
                statVal: { fontFamily: 'Orbitron', fontSize: '2rem', fontWeight: '700', margin: '0.5rem 0' },
                progressBar: (percent, color) => ({ width: '100%', height: '10px', background: '#ffffff11', borderRadius: '5px', overflow: 'hidden', marginTop: '1rem' }),
                progressFill: (percent, color) => ({ width: `${percent}%`, height: '100%', background: color, transition: 'width 1s ease-in-out' }),
                badge: (earned) => ({ 
                    width: '60px', height: '60px', borderRadius: '50%', background: earned ? `linear-gradient(135deg, ${PALETTE.teal}, ${PALETTE.blue})` : '#ffffff11',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem', filter: earned ? 'grayscale(0)' : 'grayscale(1)', opacity: earned ? 1 : 0.4
                }),
                subjectRow: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', margin: '0.8rem 0' },
                btn: (color) => ({ 
                    width: '100%', padding: '1rem', borderRadius: '1rem', border: 'none', background: color, 
                    color: 'white', fontWeight: '800', cursor: 'pointer', transition: 'transform 0.2s', marginTop: '1rem'
                }),
                toast: { 
                    position: 'fixed', top: '2rem', right: '2rem', background: `linear-gradient(90deg, ${PALETTE.teal}, ${PALETTE.blue})`,
                    padding: '1rem 2rem', borderRadius: '1rem', fontWeight: '800', boxShadow: '0 10px 30px rgba(0,0,0,0.5)', z-index: 1000
                },
                rankBanner: (up) => ({
                    position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                    zIndex: 2000, color: up ? PALETTE.teal : PALETTE.danger, fontFamily: 'Orbitron', fontSize: '4rem',
                    fontWeight: '900', textAlign: 'center', textShadow: '0 0 20px black', animation: 'rankUp 3s ease forwards'
                })
            };

            const triggerAIChallenge = () => {
                setLoadingQuest(true);
                // Simulate call to Claude
                setTimeout(() => {
                    const mockJSON = {
                        question: `Which of the following is a key characteristic of ${weakestSubject.name}?`,
                        options: { A: "It flows upwards", B: "It requires energy", C: "It is unique to Earth", D: "It is mostly solid" },
                        correct: "B",
                        explanation: `${weakestSubject.name} fundamentals involve energy transfer and state changes.`
                    };
                    setActiveQuest(mockJSON);
                    setLoadingQuest(false);
                }, 1500);
            };

            const checkAnswer = (ans) => {
                if (ans === activeQuest.correct) {
                    handleAwardXP(75, `AI Challenge Resolved!`);
                    setFeed(prev => [`Aman just solved an AI ${weakestSubject.name} challenge`, ...prev.slice(0, 4)]);
                    setActiveQuest(null);
                } else {
                    alert(`Incorrect! Correct answer was ${activeQuest.correct}. \n\n${activeQuest.explanation}`);
                    setActiveQuest(null);
                }
            };

            return (
                <div style={styles.container}>
                    {/* Header */}
                    <header style={styles.header}>
                        <div style={styles.logo}>LEARN·XP</div>
                        <nav style={styles.nav}>
                            {['DASHBOARD', 'CHALLENGES', 'LEADERBOARD'].map(tab => (
                                <button key={tab} style={styles.navBtn(activeTab === tab)} onClick={() => setActiveTab(tab)}>{tab}</button>
                            ))}
                        </nav>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                            <div style={{ textAlign: 'right' }}>
                                <div style={{ fontWeight: '800' }}>Aman Singh</div>
                                <div style={{ color: PALETTE.textDim, fontSize: '0.8rem' }}>Rank #{rank}</div>
                            </div>
                            <div style={{ width: '45px', height: '45px', background: PALETTE.teal, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '900', color: PALETTE.bg }}>AS</div>
                        </div>
                    </header>

                    {/* Toast Notification */}
                    {toast.show && <div style={styles.toast}>{toast.msg}</div>}

                    {/* Rank Change Banner */}
                    {showRankBanner && (
                        <div style={styles.rankBanner(rank < prevRank)}>
                            {rank < prevRank ? '▲ RANK UP' : '▼ RANK DOWN'}
                            <div style={{ fontSize: '1.2rem' }}>#{prevRank} → #{rank}</div>
                        </div>
                    )}

                    {/* TABS */}
                    {activeTab === 'DASHBOARD' && (
                        <div style={styles.grid}>
                            {/* Achievement Wall */}
                            <div style={{ ...styles.card, gridColumn: 'span 2' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                    <h2 style={{ fontFamily: 'Orbitron', margin: 0 }}>Achievement Wall</h2>
                                    <div style={{ color: PALETTE.teal, fontWeight: '800' }}>{streak} Day Streak 🔥</div>
                                </div>
                                <div style={{ display: 'flex', gap: '2rem', marginTop: '2rem' }}>
                                    <div>
                                        <div style={styles.statLabel}>Current XP</div>
                                        <div style={styles.statVal}>{xp.toLocaleString()}</div>
                                        <div style={{ color: PALETTE.teal, fontSize: '0.9rem' }}>Level {level} Progress</div>
                                        <div style={styles.progressBar()}>
                                            <div style={styles.progressFill((xp % 1000) / 10, PALETTE.teal)} />
                                        </div>
                                    </div>
                                    <div style={{ flexGrow: 1, background: '#ffffff0a', borderRadius: '1rem', padding: '1rem' }}>
                                        <div style={styles.statLabel}>Growth Velocity</div>
                                        <div style={{ height: '80px', display: 'flex', alignItems: 'flex-end', gap: '10px', marginTop: '1rem' }}>
                                            {[30, 45, 60, 55, 80, 70, 95].map((h, i) => (
                                                <div key={i} style={{ flexGrow: 1, height: `${h}%`, background: PALETTE.blue, borderRadius: '4px' }} />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Daily Challenge */}
                            <div style={styles.card}>
                                <div style={{ ...styles.statLabel, color: PALETTE.warning }}>Daily Grind</div>
                                <h3 style={{ margin: '0.5rem 0' }}>The Big Science MCQ</h3>
                                <p style={{ fontSize: '0.9rem', color: PALETTE.textDim }}>Solve today's elite challenge to earn +100 XP and preserve your streak.</p>
                                <button 
                                    style={styles.btn(dailyDone ? PALETTE.textDim : PALETTE.blue)} 
                                    disabled={dailyDone}
                                    onClick={() => {
                                        const ans = confirm("Science: What is the boiling point of Water at sea level? \n\nA) 90C\nB) 100C\nC) 110C\nD) 120C");
                                        if (ans) {
                                            handleAwardXP(100, "Daily Challenge Mastery!");
                                            setDailyDone(true);
                                        }
                                    }}
                                >
                                    {dailyDone ? 'DONE ✅' : 'Start Task (+100 XP)'}
                                </button>
                            </div>

                            {/* Badges + Performance */}
                            <div style={{ ...styles.card, gridColumn: 'span 2' }}>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
                                    <div>
                                        <h3>Subjects</h3>
                                        {subjects.map(s => (
                                            <div key={s.name} style={styles.subjectRow}>
                                                <span style={{ fontSize: '0.9rem' }}>{s.name} {s.score < 50 && '⚠️'}</span>
                                                <div style={{ width: '100px', ...styles.progressBar() }}>
                                                    <div style={styles.progressFill(s.score, s.color)} />
                                                </div>
                                                <span style={{ fontSize: '0.8rem', fontWeight: '800' }}>{s.score}%</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <h3>Badges</h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1rem' }}>
                                            <div style={styles.badge(true)}>🔥</div>
                                            <div style={styles.badge(true)}>⚡</div>
                                            <div style={styles.badge(true)}>🧠</div>
                                            <div style={styles.badge(false)}>🏆</div>
                                            <div style={styles.badge(false)}>💎</div>
                                            <div style={styles.badge(false)}>🌟</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Live Feed */}
                            <div style={styles.card}>
                                <h3>Nexus Pulse 🛰️</h3>
                                <div style={{ marginTop: '1rem' }}>
                                    {feed.map((f, i) => (
                                        <div key={i} style={{ padding: '0.8rem 0', borderBottom: '1px solid #ffffff0a', fontSize: '0.85rem', animation: 'slideIn 0.3s ease' }}>
                                            {f}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'CHALLENGES' && (
                        <div style={{ ...styles.card, margin: '2rem auto', maxWidth: '600px', textAlign: 'center' }}>
                            <div style={{ color: PALETTE.danger, fontWeight: '800' }}>AI SYSTEM ACTIVE</div>
                            <h2 style={{ fontFamily: 'Orbitron' }}>Battle Weakness: {weakestSubject.name}</h2>
                            <p style={{ color: PALETTE.textDim }}>Targeting your lowest performance area to optimize your Level {level} growth.</p>
                            
                            {!activeQuest ? (
                                <button style={styles.btn(PALETTE.teal)} onClick={triggerAIChallenge}>
                                    {loadingQuest ? 'QUERYING CLAUDE...' : 'Generate AI Challenge'}
                                </button>
                            ) : (
                                <div style={{ textAlign: 'left', marginTop: '2rem' }}>
                                    <h4 style={{ color: PALETTE.teal }}>Question:</h4>
                                    <p style={{ fontSize: '1.2rem', fontWeight: '600' }}>{activeQuest.question}</p>
                                    <div style={{ display: 'grid', gap: '1rem', marginTop: '1rem' }}>
                                        {Object.entries(activeQuest.options).map(([key, val]) => (
                                            <button 
                                                key={key} 
                                                style={{ padding: '1rem', background: '#ffffff0a', border: '1px solid #ffffff22', borderRadius: '0.8rem', color: 'white', textAlign: 'left', cursor: 'pointer' }}
                                                onClick={() => checkAnswer(key)}
                                            >
                                                <strong>{key})</strong> {val}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'LEADERBOARD' && (
                        <div style={{ ...styles.card, maxWidth: '800px', margin: '0 auto' }}>
                            <h2 style={{ fontFamily: 'Orbitron', textAlign: 'center', marginBottom: '2rem' }}>Elite Leaderboard</h2>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                {INITIAL_LEADERBOARD.map((u, i) => {
                                    const currentXp = u.current ? xp : u.xp;
                                    return (
                                        <div key={u.name} style={{ 
                                            display: 'flex', alignItems: 'center', padding: '1rem 1.5rem', 
                                            borderRadius: '1rem', background: u.current ? `${PALETTE.teal}11` : '#ffffff05',
                                            border: u.current ? `1px solid ${PALETTE.teal}44` : '1px solid transparent'
                                        }}>
                                            <div style={{ width: '40px', fontWeight: '900', color: PALETTE.textDim }}>#{i + 1}</div>
                                            <div style={{ width: '40px', height: '40px', background: u.color, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: '800', marginRight: '1rem' }}>{u.avatar}</div>
                                            <div style={{ flexGrow: 1, fontWeight: '700' }}>{u.name}</div>
                                            <div style={{ fontFamily: 'Orbitron', color: PALETTE.teal }}>{currentXp.toLocaleString()} XP</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
