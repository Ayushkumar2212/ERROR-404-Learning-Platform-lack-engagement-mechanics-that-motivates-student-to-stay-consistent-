<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARN·XP | Elite Student Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.4} }
        @keyframes slideIn { from {opacity:0; transform:translateX(20px)} to {opacity:1; transform:translateX(0)} }
        @keyframes rankUp { from {transform:scale(0.8); opacity:0} to {transform:scale(1); opacity:1} }
        @keyframes xpFloat { 0% {opacity:1; transform:translateY(0) scale(1)} 100% {opacity:0; transform:translateY(-80px) scale(1.2)} }
        @keyframes badgePop { 0% {transform:scale(0.5); opacity:0} 70% {transform:scale(1.15)} 100% {transform:scale(1); opacity:1} }
        
        * { box-sizing: border-box; transition: background-color 0.3s ease, color 0.3s ease; }
        body { margin: 0; padding: 0; font-family: 'Nunito', sans-serif; overflow-x: hidden; width: 100%; -webkit-text-size-adjust: 100%; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #00f5c4; border-radius: 10px; }

        @media (max-width: 768px) {
            .app-header { flex-direction: column; height: auto !important; padding: 12px !important; gap: 12px; align-items: flex-start !important; }
            .header-search { width: 100% !important; margin: 5px 0; }
            .nav-tabs { width: 100%; overflow-x: auto; display: flex; gap: 8px; padding: 8px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
            .nav-tabs::-webkit-scrollbar { display: none; }
            .nav-tabs button { padding: 8px 16px !important; font-size: 0.75rem !important; white-space: nowrap; flex-shrink: 0; background: rgba(255,255,255,0.03) !important; border-radius: 12px !important; }
            .user-stats-bar { width: 100%; justify-content: flex-end; gap: 15px !important; }
            .main-content { padding: 12px !important; width: 100% !important; max-width: 100% !important; }
            .dashboard-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
            .span-2 { grid-column: auto !important; }
            .card-padding { padding: 16px !important; border-radius: 16px !important; }
            h2 { font-size: 1.2rem !important; }
            h1 { font-size: 1.5rem !important; }
            .mobile-hide { display: none !important; }
            .lab-table { display: none; }
            .lab-cards { display: block !important; }
            .login-card { padding: 32px 20px !important; }
        }
    </style>
</head>

        // --- SUB-COMPONENTS ---

        const SparkLine = ({ data, theme }) => {
            const max = Math.max(...data);
            const min = Math.min(...data);
            const width = 200;
            const height = 40;
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((d - min) / (max - min)) * height;
                return `${x},${y}`;
            }).join(' ');
            
            const areaPoints = `${points} ${width},${height} 0,${height}`;

            return (
                <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>
                    <defs>
                        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#00f5c4" stopOpacity="0.3" />
                            <stop offset="100%" stopColor="#00f5c4" stopOpacity="0" />
                        </linearGradient>
                    </defs>
                    <polygon points={areaPoints} fill="url(#sparkGrad)" />
                    <polyline points={points} fill="none" stroke="#00f5c4" strokeWidth="2" strokeLinejoin="round" />
                    <circle cx={width} cy={height - ((data[data.length-1] - min) / (max - min)) * height} r="3" fill="#00f5c4" />
                </svg>
            );
        };

        const ProgressRing = ({ progress, size = 48, stroke = 3, children }) => {
            const radius = (size - stroke) / 2;
            const circum = radius * 2 * Math.PI;
            const offset = circum - progress * circum;

            return (
                <div style={{ position: 'relative', width: size, height: size, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <svg width={size} height={size} style={{ position: 'absolute', transform: 'rotate(-90deg)' }}>
                        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke} />
                        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="url(#ringGrad)" strokeWidth={stroke} 
                                strokeDasharray={circum} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
                        <defs>
                            <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stopColor="#00f5c4" />
                                <stop offset="100%" stopColor="#0086ff" />
                            </linearGradient>
                        </defs>
                    </svg>
                    {children}
                </div>
            );
        };

        const ToastContainer = ({ toasts }) => (
            <div style={{ position: 'fixed', top: 20, right: 20, zIndex: 10000, display: 'flex', flexDirection: 'column', gap: 10 }}>

        const XPFloatContainer = ({ floats }) => (

                {floats.map(f => (

        const AI_COMMANDS = {

            ]

        const ConfettiCanvas = ({ active }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!active) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                let particles = Array.from({ length: 120 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    vx: Math.random() * 4 - 2,
                    vy: Math.random() * 5 + 5,
                    color: ['#00f5c4', '#0086ff', '#ff9a3c', '#ff4d6d'][Math.floor(Math.random() * 4)],
                    size: Math.random() * 8 + 4
                }));
                let frame;
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.ellipse(p.x, p.y, p.size, p.size / 2, Math.random(), 0, Math.PI * 2);
                        ctx.fill();
                        p.x += p.vx; p.y += p.vy;
                    });
                    frame = requestAnimationFrame(render);
                };
                render();
                const timeout = setTimeout(() => cancelAnimationFrame(frame), 3000);
                return () => { clearTimeout(timeout); cancelAnimationFrame(frame); };
            }, [active]);
            return <canvas ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh', pointerEvents: 'none', zIndex: 9998 }} />;
        };


        const NexusLab = ({ C }) => {

            }, [selectedDb]);

            const dbs = [
                { id: 'molecular', name: 'Molecular Physics', icon: '⚛️' },

            return (

                    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 24, padding: 32, marginBottom: 24 }}>

                            </div>
                            <div style={{ display:'flex', gap:10 }}>
                                {dbs.map(db => (

                                        <span>{db.icon}</span> {db.name.split(' ')[0]}
                                    </button>
                                ))}
                            </div>
                        </div>
                        {loading ? (
                            <div style={{ textAlign:'center', padding: 80, color:C.sub }}>
                                <div style={{ border:'4px solid rgba(0,245,196,0.1)', borderTop:'4px solid #00f5c4', borderRadius:'50%', width:40, height:40, animation:'spin 1s linear infinite', margin:'0 auto 16px' }} />
                                Syncing with {selectedDb} clusters...
                            </div>
                        ) : (
                            <>
                                <div className="lab-table" style={{ overflowX: 'auto', borderRadius:16, border:`1px solid ${C.border}` }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize:'0.75rem' }}>
                                        <thead>
                                            <tr style={{ textAlign: 'left', background: 'rgba(255,255,255,0.03)' }}>
                                                {moleculeData?.headers?.slice(0, 8).map(h => <th key={h} style={{ padding: '16px', color: C.sub, textTransform: 'uppercase', letterSpacing:1 }}>{h.slice(0, 15).replace('_', ' ')}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {moleculeData?.data?.map((row, i) => (
                                                <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? 'rgba(255,255,255,0.01)' : 'transparent', transition:'background 0.2s' }} onMouseEnter={(e)=>e.currentTarget.style.background='rgba(0,245,196,0.02)'} onMouseLeave={(e)=>e.currentTarget.style.background=i%2===0?'rgba(255,255,255,0.01)':'transparent'}>
                                                    {row.slice(0, 8).map((col, j) => <td key={j} style={{ padding: '14px 16px', fontWeight: 600 }}>{col}</td>)}

                                 "Insurance claim metrics. Data reveals clear correlations between lifestyle factors and long-term coverage sustainability."}
                            </p>

        const NexusCommunity = ({ user, C }) => {
            const [groups, setGroups] = useState([

                                    </div>

                    ) : (

                                    </div>
                                    <div style={{ width:36, height:36, borderRadius:'50%', background:'linear-gradient(135deg, #00f5c4, #0086ff)', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.8rem', fontWeight:900 }}>{user.avatar}</div>

                            <div style={{ padding:24, borderTop:`1px solid ${C.border}` }}>
                                <form onSubmit={(e)=>{e.preventDefault(); setChatText(""); showToast("Message Sent! 🛰️")}} style={{ display:'flex', gap:12 }}>
                                    <input value={chatText} onChange={(e)=>setChatText(e.target.value)} placeholder="Send a message to the squad..." style={{ flex:1, padding:16, borderRadius:16, border:`1px solid ${C.border}`, background:'rgba(255,255,255,0.05)', color:C.text, fontWeight:600 }} />
                                    <button type="submit" style={{ width:50, height:50, borderRadius:15, border:'none', background:'#00f5c4', color:'#070b18', fontWeight:900, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>➤</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- MAIN APP ---

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [authView, setAuthView] = useState('login'); // 'login' | 'register'
            const [authLoading, setAuthLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            
            // Persistent Users Storage
            const [registeredUsers, setRegisteredUsers] = useState(() => {
                const saved = localStorage.getItem('learnXP_users');
                return saved ? JSON.parse(saved) : [];
            });

            const [theme, setTheme] = useState('dark');
            const C = THEMES[theme];
            const [activeTab, setActiveTab] = useState('dashboard');
            const [user, setUser] = useState(INITIAL_USER);
            const [leaderboard, setLeaderboard] = useState(INITIAL_LEADERBOARD);
            const [toasts, setToasts] = useState([]);
            const [floats, setFloats] = useState([]);
            const [confetti, setConfetti] = useState(false);
            const [dailyAnswered, setDailyAnswered] = useState(false);
            const [activities, setActivities] = useState([{ id: 1, text: "Welcome to Learn·XP!", time: "now" }]);
            const [rankDelta, setRankDelta] = useState(0);
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [aiChallenge, setAiChallenge] = useState(null);
            const [aiLoading, setAiLoading] = useState(false);
            const [aiAnswered, setAiAnswered] = useState(false);
            const [aiTimer, setAiTimer] = useState(30);
            const [aiNavQuery, setAiNavQuery] = useState("");
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [foundEmail, setFoundEmail] = useState(""); // Track for persistence
            
            // Quiz State
            const [quizMode, setQuizMode] = useState(null); // { subject, size, index, score, questions }
            
            // --- STREAK LOGIC ---
            useEffect(() => {
                if (isLoggedIn) {
                    const lastLogin = localStorage.getItem(`lastLogin_${user.name}`);
                    const today = new Date().toDateString();
                    if (lastLogin !== today) {
                        const yesterday = new Date();
                        yesterday.setDate(yesterday.getDate() - 1);
                        if (lastLogin === yesterday.toDateString()) {
                            setUser(u => ({ ...u, streak: u.streak + 1 }));
                        } else {
                            // If more than a day missed, keep streak or reset? User said "count ho days se"
                            // We'll keep it simple for now and just set lastLogin.
                        }
                        localStorage.setItem(`lastLogin_${user.name}`, today);
                    }
                }
            }, [isLoggedIn]);

            const showToast = (msg) => {
                const id = Date.now();
                setToasts(prev => [...prev.slice(-2), { id, msg }]);
                setTimeout(() => setToasts(p => p.filter(x => x.id !== id)), 3500);
            };

            const spawnFloat = (amount, x, y) => {
                const id = Date.now();
                setFloats(prev => [...prev, { id, amount, x, y }]);
                setTimeout(() => setFloats(p => p.filter(x => x.id !== id)), 1400);
            };

            const addXP = (amount, source, e) => {
                spawnFloat(amount, e?.clientX || window.innerWidth/2, e?.clientY || window.innerHeight/2);
                
                // Real-time Sort Logic
                const newXp = user.xp + amount;
                const updatedUser = { ...user, xp: newXp, xpHistory: [...user.xpHistory.slice(1), newXp] };
                setUser(updatedUser);
                showToast(`+${amount} XP ${source}!`);
                setActivities([{ id: Date.now(), text: `${user.name} earned ${amount} XP from ${source}`, time: "just now" }, ...activities.slice(0, 10)]);
                
                setLeaderboard(prev => {
                    const newLb = prev.map(l => l.isYou ? { ...l, xp: newXp } : l).sort((a,b) => b.xp - a.xp).map((l, i) => ({ ...l, rank: i + 1 }));
                    const oldRank = prev.find(l => l.isYou).rank;
                    const newRank = newLb.find(l => l.isYou).rank;
                    
                    if (newRank < oldRank) { setRankDelta(-1); setTimeout(() => setRankDelta(0), 3000); }
                    else if (newRank > oldRank) { setRankDelta(1); setTimeout(() => setRankDelta(0), 3000); }
                    
                    return newLb;
                });
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('name');
                const email = formData.get('email');
                const pass = formData.get('pass');

                if (registeredUsers.some(u => u.email === email)) {
                    showToast("❌ Email already exists!");
                    return;
                }

                setAuthLoading(true);
                setTimeout(() => {
                    const updated = [...registeredUsers, { name, email, pass }];
                    setRegisteredUsers(updated);
                    localStorage.setItem('learnXP_users', JSON.stringify(updated));
                    setAuthLoading(false);
                    setAuthView('login');
                    showToast("Account Created! 🚀 Plase login.");
                }, 1000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const email = formData.get('email');
                const pass = formData.get('pass');

                const found = registeredUsers.find(u => u.email === email && u.pass === pass);
                if (!found) {
                    showToast("❌ No account found with these details!");
                    return;
                }

                setAuthLoading(true);
                setTimeout(() => {
                    setUser({ ...INITIAL_USER, name: found.name, avatar: found.name.charAt(0).toUpperCase() });
                    setFoundEmail(email);
                    setIsLoggedIn(true);
                    setAuthLoading(false);
                    showToast(`Welcome, ${found.name}! 🌟`);
                }, 1200);
            };

            const weakestSubject = useMemo(() => Object.entries(user.subjectPerformance).reduce((p, c) => c[1] < p[1] ? c : p)[0], [user.subjectPerformance]);
            const cardStyle = { background: C.card, border: `1px solid ${C.border}`, borderRadius: 24, padding: 24, backdropFilter: 'blur(10px)', transition: 'all 0.3s' };

            useEffect(() => {
                const interval = setInterval(() => {
                    const text = MOCK_ACTIVITIES[Math.floor(Math.random() * MOCK_ACTIVITIES.length)];
                    setActivities(prev => [{ id: Date.now(), text, time: "now" }, ...prev.slice(0, 5)]);
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            if (!isLoggedIn) {
                return (
                    <div style={{ backgroundColor: C.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
                        <ToastContainer toasts={toasts} />
                        <div style={{ position: 'fixed', top: 20, right: 20 }}>
                             <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} style={{ background: C.card, border: `1px solid ${C.border}`, padding: 8, borderRadius: 10, cursor: 'pointer', color: C.text }}>{theme === 'dark' ? '☀️' : '🌙'}</button>
                        </div>
                        <div style={{ ...cardStyle, width: '100%', maxWidth: 420, padding: '40px 32px', textAlign: 'center', animation: 'slideIn 0.5s ease-out' }}>
                            <div style={{ width: 64, height: 64, background: 'linear-gradient(135deg, #00f5c4, #0086ff)', borderRadius: 18, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 32px rgba(0,245,196,0.3)' }}><span style={{ fontFamily: 'Orbitron', fontWeight: 900, fontSize: '1.5rem', color: '#070b18' }}>XP</span></div>
                            <h1 style={{ fontSize: '1.8rem', margin: '0 0 8px', fontFamily: 'Orbitron' }}>{authView === 'login' ? 'Welcome' : 'Register'}</h1>
                            <p style={{ color: C.sub, marginBottom: 32 }}>{authView === 'login' ? 'Continue your learning journey' : 'Start your evolution today'}</p>
                            
                            <form onSubmit={authView === 'login' ? handleLogin : handleRegister} style={{ textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 16 }}>
                                {authView === 'register' && (
                                    <div style={{ position: 'relative' }}>
                                        <span style={{ position: 'absolute', left: 16, top: 16, opacity: 0.6 }}>👤</span>
                                        <input name="name" type="text" required placeholder="Full Name" style={{ width: '100%', padding: '16px 16px 16px 48px', borderRadius: 16, background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.border}`, color: C.text, fontWeight: 600, outline: 'none' }} />
                                    </div>
                                )}
                                <div style={{ position: 'relative' }}>
                                    <span style={{ position: 'absolute', left: 16, top: 16, opacity: 0.6 }}>📧</span>
                                    <input name="email" type="email" required placeholder="Email Address" style={{ width: '100%', padding: '16px 16px 16px 48px', borderRadius: 16, background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.border}`, color: C.text, fontWeight: 600, outline: 'none' }} />
                                </div>
                                <div style={{ position: 'relative' }}>
                                    <span style={{ position: 'absolute', left: 16, top: 16, opacity: 0.6 }}>🔒</span>
                                    <input name="pass" type={showPassword ? "text" : "password"} required placeholder="Password" style={{ width: '100%', padding: '16px 30px 16px 48px', borderRadius: 16, background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.border}`, color: C.text, fontWeight: 600, outline: 'none' }} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} style={{ position: 'absolute', right: 16, top: 18, background: 'none', border: 'none', cursor: 'pointer', color: '#00f5c4', fontWeight: 800, fontSize: '0.7rem' }}>{showPassword ? "HIDE" : "SHOW"}</button>
                                </div>
                                <button disabled={authLoading} style={{ width: '100%', padding: 16, borderRadius: 16, border: 'none', background: '#00f5c4', color: '#070b18', fontWeight: 900, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 8 }}>
                                    {authLoading ? <div style={{ width: 20, height: 20, border: '3px solid #070b18', borderTop: '3px solid transparent', borderRadius: '50%', animation: 'pulse 1s linear infinite' }} /> : (authView === 'login' ? 'Login' : 'Join Now')}
                                </button>
                            </form>

                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '24px 0' }}><div style={{ flex: 1, height: 1, background: C.border }} /><span style={{ fontSize: '0.7rem', color: C.sub, fontWeight: 900 }}>OR CONNECT</span><div style={{ flex: 1, height: 1, background: C.border }} /></div>
                            <div style={{ display: 'flex', gap: 12 }}>
                                <button style={{ flex: 1, padding: 12, borderRadius: 12, border: `1px solid ${C.border}`, background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" /></button>
                                <button style={{ flex: 1, padding: 12, borderRadius: 12, border: `1px solid ${C.border}`, background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><img src="https://www.svgrepo.com/show/443329/apple.svg" style={{filter: theme==='dark'?'invert(1)':'none'}} width="20" /></button>
                            </div>
                            <p style={{ marginTop: 32, fontSize: '0.9rem', color: C.sub }}>
                                {authView === 'login' ? "New here?" : "Already a member?"} 
                                <button onClick={() => setAuthView(authView === 'login' ? 'register' : 'login')} style={{ background: 'none', border: 'none', color: '#00f5c4', fontWeight: 800, cursor: 'pointer', marginLeft: 5 }}>
                                    {authView === 'login' ? 'Register' : 'Login'}
                                </button>
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ backgroundColor: C.bg, color: C.text, minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <ConfettiCanvas active={confetti} /><XPFloatContainer floats={floats} /><ToastContainer toasts={toasts} />
                    <header className="app-header" style={{ width: '100%', position: 'sticky', top: 0, zIndex: 1000, backdropFilter: 'blur(12px)', padding: '12px 24px', borderBottom: `1px solid ${C.border}`, background: theme === 'dark' ? 'rgba(7,11,24,0.85)' : 'rgba(255,255,255,0.85)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 20, flex: 1 }}>
                            <div style={{ fontFamily: 'Orbitron', fontSize: '1.2rem', fontWeight: 900, color: '#00f5c4', whiteSpace:'nowrap' }}>LEARN·XP</div>
                            <div className="header-search" style={{ position: 'relative', width: 280 }}>
                                <input 
                                    value={aiNavQuery}
                                    onChange={(e) => {
                                        setAiNavQuery(e.target.value);
                                        const cmd = e.target.value.toLowerCase();
                                        Object.keys(AI_COMMANDS).forEach(key => {
                                            if (cmd.includes(key)) {
                                                setActiveTab(AI_COMMANDS[key]);
                                                showToast(`AI: Loading ${AI_COMMANDS[key]}...`);
                                            }
                                        });
                                    }}
                                    placeholder="Search Nexus AI..." 
                                    style={{ width: '100%', padding: '8px 12px 8px 36px', borderRadius: 12, border: `1px solid ${C.border}`, background: 'rgba(255,255,255,0.05)', color: C.text, fontWeight: 600, outline: 'none', fontSize:'0.9rem' }} 
                                />
                                <span style={{ position: 'absolute', left: 10, top: 10, fontSize:'0.8rem' }}>🤖</span>
                            </div>
                        </div>
                        <nav className="nav-tabs" style={{ display: 'flex', gap: 4 }}>
                            {['dashboard', 'challenges', 'leaderboard', 'lab', 'community', 'settings'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} style={{ padding: '8px 12px', borderRadius: 10, border: 'none', background: activeTab === t ? 'rgba(0,245,196,0.15)' : 'transparent', color: activeTab === t ? '#00f5c4' : C.sub, fontWeight: 700, cursor: 'pointer', textTransform: 'capitalize', fontSize:'0.85rem' }}>{t.replace('-', ' ')}</button>
                            ))}
                        </nav>
                        <div className="user-stats-bar" style={{ display: 'flex', alignItems: 'center', gap: 12, marginLeft:15 }}>
                            <div className="mobile-hide" style={{ background: C.card, padding: '4px 10px', borderRadius: 8, fontSize: '0.75rem', fontWeight: 900, color: '#ff9a3c', whiteSpace:'nowrap' }}>🔥 {user.streak} DAYS</div>
                            <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} style={{ background: C.card, border: `1px solid ${C.border}`, padding: 6, borderRadius: 8, cursor: 'pointer', color: C.text }}>{theme === 'dark' ? '☀️' : '🌙'}</button>
                            <ProgressRing progress={(user.xp % 500) / 500} size={32}><div style={{ width: 28, height: 28, borderRadius: '50%', background: 'linear-gradient(135deg, #00f5c4, #0086ff)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: '0.7rem', color: '#070b18' }}>{user.avatar}</div></ProgressRing>
                        </div>
                    </header>
                    {rankDelta !== 0 && (<div style={{ position: 'fixed', top: '20%', left: '50%', transform: 'translateX(-50%)', zIndex: 5000, padding: '1rem 3rem', borderRadius: 50, background: rankDelta === -1 ? 'rgba(0,245,196,0.9)' : 'rgba(255,77,109,0.9)', color: 'white', fontWeight: 900, fontFamily: 'Orbitron', boxShadow: '0 0 40px rgba(0,0,0,0.5)', animation: 'rankUp 0.5s ease-out' }}>{rankDelta === -1 ? '▲ RANK UP' : '▼ RANK DOWN'}</div>)}
                    <main className="main-content" style={{ width: '100%', maxWidth: 1200, padding: 24, flex: 1 }}>
                        {activeTab === 'dashboard' && (
                            <div className="dashboard-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 24 }}>
                                <div className="span-2 card-padding" style={{ ...cardStyle, gridColumn: 'span 2' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <div><h2 style={{ fontSize: '1.8rem', margin: 0, fontFamily: 'Orbitron' }}>Achievement Wall 🏆</h2><p style={{ color: C.sub, margin: '4px 0 20px' }}>Rank #{leaderboard.find(l=>l.isYou).rank} • Level {user.level} </p></div>
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ fontSize: '1.5rem', fontWeight: 900, color: '#ff9a3c', display: 'flex', alignItems: 'center', gap: 8 }}>🔥 {user.streak}<span style={{fontSize:'0.8rem', background:'rgba(255,154,60,0.1)', padding:'2px 8px', borderRadius:8}}>STREAK</span></div>
                                            <div style={{ color: C.sub, fontSize: '0.8rem', marginTop: 4 }}>Last Login: {new Date().toLocaleDateString()}</div>
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: '0.9rem', fontWeight: 700 }}>
                                                <span>Total XP: {user.xp.toLocaleString()}</span>
                                                <span style={{ color: '#00f5c4' }}>Goal: 5000 XP</span>
                                            </div>
                                            <div style={{ height: 12, background: 'rgba(255,255,255,0.1)', borderRadius: 6, overflow: 'hidden' }}>
                                                <div style={{ height: '100%', width: `${(user.xp / 5000) * 100}%`, background: 'linear-gradient(90deg, #00f5c4, #0086ff)', transition:'width 1s ease' }} />
                                            </div>
                                        </div>
                                        <div style={{ textAlign:'center' }}>
                                            <SparkLine data={user.xpHistory} theme={theme} />
                                            <div style={{fontSize:'0.7rem', color:C.sub, fontWeight:800, marginTop:4}}>WEEKLY XP TREND</div>
                                        </div>
                                    </div>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8, marginTop: 24 }}>
                                        {['M','T','W','T','F','S','S'].map((d, i) => (
                                            <div key={i} style={{ textAlign:'center' }}>
                                                <div style={{ width: '100%', height: 30, borderRadius: 8, background: i < (user.streak % 7) ? 'rgba(0,245,196,0.2)' : 'rgba(255,255,255,0.05)', border: i < (user.streak % 7) ? '1px solid #00f5c4' : 'none', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900, color: i < (user.streak % 7) ? '#00f5c4' : C.sub }}>{d}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div style={{ ...cardStyle }}>
                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                                        <span style={{ color: '#ff9a3c', fontWeight: 900, fontSize: '0.7rem', textTransform: 'uppercase' }}>Elite Quest Hub</span>
                                        <span style={{ background:'rgba(0,134,255,0.1)', color:'#0086ff', padding:'4px 8px', borderRadius:8, fontSize:'0.7rem', fontWeight:900 }}>AI READY</span>
                                    </div>
                                    {!quizMode ? (
                                        <>
                                            <h3 style={{ margin: '0 0 10px', fontSize: '1.3rem' }}>Daily Power-Up</h3>
                                            <p style={{ color: C.sub, fontSize: '0.9rem', marginBottom: 20 }}>Level {user.quizLevel} Master • Boost your {weakestSubject} rank.</p>
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                                <button onClick={() => setQuizMode({ subject: weakestSubject, size: 5, index: 0, score: 0, questions: MOCK_QUIZZES[weakestSubject] || MOCK_QUIZZES.Math })} style={{ padding: 16, borderRadius: 16, border: 'none', background: 'rgba(255,255,255,0.05)', color: C.text, fontWeight: 800, cursor: 'pointer', textAlign: 'left', display:'flex', justifyContent:'space-between' }}>
                                                    <span>5 Questions Set</span><span style={{color:'#00f5c4'}}>+250 XP</span>
                                                </button>
                                                <button onClick={() => setQuizMode({ subject: weakestSubject, size: 10, index: 0, score: 0, questions: [...(MOCK_QUIZZES[weakestSubject] || MOCK_QUIZZES.Math), ...(MOCK_QUIZZES.Science)] })} style={{ padding: 16, borderRadius: 16, border: 'none', background: 'linear-gradient(135deg, rgba(0,245,196,0.1), rgba(0,134,255,0.1))', color: C.text, fontWeight: 800, cursor: 'pointer', textAlign: 'left', display:'flex', justifyContent:'space-between' }}>
                                                    <span>10 Questions Set</span><span style={{color:'#0086ff'}}>+600 XP</span>
                                                </button>
                                            </div>
                                        </>
                                    ) : (
                                        <div style={{ animation: 'slideIn 0.3s ease' }}>
                                            <div style={{ display:'flex', justifyContent:'space-between', fontSize:'0.8rem', fontWeight:900, marginBottom:8 }}>
                                                <span>Lvl {user.quizLevel} Quiz • Q-{quizMode.index + 1}/{quizMode.size}</span>
                                                <span>Score: {quizMode.score}</span>
                                            </div>
                                            <div style={{ height: 6, width: '100%', background: 'rgba(255,255,255,0.1)', borderRadius: 3, marginBottom: 20 }}>
                                                <div style={{ height: '100%', width: `${((quizMode.index + 1) / quizMode.size) * 100}%`, background: '#00f5c4', transition: 'width 0.3s' }} />
                                            </div>
                                            <h4 style={{ margin: '0 0 20px', fontSize: '1.1rem' }}>{quizMode.questions[quizMode.index % quizMode.questions.length].q}</h4>
                                            <div style={{ display:'grid', gap: 10 }}>
                                                {quizMode.questions[quizMode.index % quizMode.questions.length].o.map(opt => (
                                                    <button key={opt} onClick={(e) => {
                                                        const correct = quizMode.questions[quizMode.index % quizMode.questions.length].c;
                                                        if (opt === correct) {
                                                            setQuizMode(q => ({ ...q, score: q.score + 1 }));
                                                            addXP(50, "Correct Answer", e);
                                                        } else {
                                                            showToast("Mistake! Study harder 📚");
                                                        }
                                                        if (quizMode.index + 1 === quizMode.size) {
                                                            const bonus = quizMode.score * 50;
                                                            addXP(bonus, "Final Quiz Bonus", e);
                                                            setUser(u => ({ ...u, quizLevel: u.quizLevel + 1 }));
                                                            showToast(`Quest Complete! Reached Quiz Level ${user.quizLevel + 1} 🚀`);
                                                            setQuizMode(null);
                                                            setConfetti(true);
                                                            setTimeout(() => setConfetti(false), 3000);
                                                        } else {
                                                            setQuizMode(q => ({ ...q, index: q.index + 1 }));
                                                        }
                                                    }} style={{ padding: 12, borderRadius: 12, border: `1px solid ${C.border}`, background: 'rgba(255,255,255,0.05)', color: C.text, fontWeight: 700, cursor: 'pointer', textAlign: 'left' }}>{opt}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div style={{ ...cardStyle, gridColumn: 'span 2' }}>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
                                        <div>
                                            <h3 style={{ margin: '0 0 16px', display:'flex', alignItems:'center', gap:10 }}>Mastery Badges <span style={{fontSize:'0.8rem', background:'rgba(255,255,255,0.1)', padding:'2px 8px', borderRadius:8}}>{user.badges.filter(b=>b.earned).length}/{user.badges.length}</span></h3>
                                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                                                {user.badges.map(b => (
                                                    <div key={b.id} style={{ textAlign: 'center', padding: 8, background: b.earned ? 'rgba(0,245,196,0.1)' : 'rgba(255,255,255,0.03)', borderRadius: 16, border: b.earned ? '1px solid #00f5c4' : `1px solid transparent`, opacity: b.earned ? 1 : 0.4, transition: 'all 0.3s' }}>
                                                        <div style={{ fontSize: '1.8rem', marginBottom: 4, filter: b.earned ? 'none' : 'grayscale(1)' }}>{b.icon}</div>
                                                        <div style={{ fontSize: '0.65rem', fontWeight: 900, textTransform:'uppercase' }}>{b.label}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 style={{ margin: '0 0 16px' }}>Course Performance</h3>
                                            {Object.entries(user.subjectPerformance).map(([sub, val]) => (
                                                <div key={sub} style={{ marginBottom: 12 }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem', fontWeight: 800, marginBottom: 4 }}>
                                                        <span style={{color: sub === weakestSubject ? '#ff4d6d' : C.text}}>{sub} {sub === weakestSubject && '🎯'}</span>
                                                        <span>{val}%</span>
                                                    </div>
                                                    <div style={{ height: 8, background: 'rgba(255,255,255,0.05)', borderRadius: 4, overflow: 'hidden' }}>
                                                        <div style={{ height: '100%', width: `${val}%`, background: val < 50 ? 'linear-gradient(90deg, #ff4d6d, #ff9a3c)' : 'linear-gradient(90deg, #00f5c4, #0086ff)', transition:'width 1s ease' }} />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div style={{ ...cardStyle, height: 350, display: 'flex', flexDirection: 'column' }}>
                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                                        <h3 style={{ margin: 0 }}>Nexus Pulse 🛰️</h3>
                                        <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#00f5c4', animation: 'pulse 1.5s infinite' }} />
                                    </div>
                                    <div style={{ flex: 1, overflowY: 'auto', paddingRight: 8 }}>
                                        {activities.map((a, i) => (
                                            <div key={a.id} style={{ padding: '12px 10px', borderBottom: `1px solid ${C.border}`, fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: 10, animation: i === 0 ? 'slideIn 0.3s ease-out' : 'none' }}>
                                                <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'rgba(255,255,255,0.05)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.8rem' }}>{a.text.charAt(0)}</div>
                                                <div style={{ flex: 1 }}>
                                                    <div style={{ fontWeight: 700 }}>{a.text}</div>
                                                    <span style={{ fontSize: '0.7rem', color: C.sub }}>{a.time}</span>
                                                </div>
                                                <div style={{ color:'#00f5c4', fontWeight:900, fontSize:'0.75rem' }}>LIVE</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'challenges' && (<div style={{ width: '100%', maxWidth: 700, margin: '0 auto', ...cardStyle }}><div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 24 }}>{SUBJECTS.map(s => (<button key={s} onClick={() => setSelectedSubject(s)} style={{ padding: '8px 20px', borderRadius: 20, border: `2px solid ${(selectedSubject || weakestSubject) === s ? '#00f5c4' : C.border}`, background: (selectedSubject || weakestSubject) === s ? 'rgba(0,245,196,0.1)' : 'transparent', color: (selectedSubject || weakestSubject) === s ? '#00f5c4' : C.sub, fontWeight: 700, cursor: 'pointer' }}>{s}</button>))}</div><div style={{ background: 'rgba(0,134,255,0.1)', padding: 16, borderRadius: 16, marginBottom: 24, border: '1px solid rgba(0,134,255,0.2)' }}><span style={{ fontWeight: 800 }}>Level {user.level} {user.level <= 3 ? "Beginner" : user.level <= 6 ? "Intermediate" : "Advanced"}</span><p style={{ margin: '4px 0 0', fontSize: '0.9rem', color: C.sub }}>Current {selectedSubject || weakestSubject} Performance: {user.subjectPerformance[selectedSubject || weakestSubject]}%</p></div>{!aiChallenge ? (<button onClick={() => { setAiLoading(true); setAiAnswered(false); setAiTimer(30); setTimeout(() => { setAiChallenge({ question: `Challenge: What is the most likely outcome of a high performance in ${selectedSubject || weakestSubject}?`, options: { A: "Lower streak", B: "Accelerated XP gain", C: "Random reset", D: "Difficulty drop" }, correct: "B", explanation: "Consistency in subjects triggers the accelerated growth multiplier." }); setAiLoading(false); }, 1500); }} disabled={aiLoading} style={{ width: '100%', padding: 20, borderRadius: 16, border: 'none', background: 'linear-gradient(135deg, #00f5c4, #0086ff)', color: 'white', fontWeight: 900, fontFamily: 'Orbitron', cursor: 'pointer', opacity: aiLoading ? 0.7 : 1 }}>{aiLoading ? "GENERATING QUEST..." : "GENERATE AI CHALLENGE"}</button>) : (<div style={{ animation: 'slideIn 0.3s ease' }}><div style={{ width: '100%', height: 6, background: 'rgba(255,255,255,0.1)', borderRadius: 3, marginBottom: 24, overflow: 'hidden' }}><div style={{ height: '100%', width: `${(aiTimer/30)*100}%`, transition: 'width 1s linear', background: aiTimer > 15 ? '#00f5c4' : aiTimer > 8 ? '#ff9a3c' : '#ff4d6d' }} /></div><h3 style={{ fontSize: '1.4rem', marginBottom: 20 }}>{aiChallenge.question}</h3><div style={{ display: 'grid', gap: 12 }}>{Object.entries(aiChallenge.options).map(([key, val]) => (<button key={key} disabled={aiAnswered} onClick={(e) => { setAiAnswered(key); if (key === aiChallenge.correct) addXP(75, "AI Quest Mastery", e); else showToast("Incorrect! Keep going 💪"); }} style={{ padding: 16, borderRadius: 12, textAlign: 'left', border: `1px solid ${C.border}`, background: aiAnswered ? (key === aiChallenge.correct ? 'rgba(0,245,196,0.2)' : (aiAnswered === key ? 'rgba(255,77,109,0.2)' : 'transparent')) : 'rgba(255,255,255,0.05)', color: C.text, cursor: aiAnswered ? 'default' : 'pointer', fontWeight: 700 }}><strong>{key})</strong> {val}</button>))}</div>{aiAnswered && (<div style={{ marginTop: 20, padding: 16, background: 'rgba(255,255,255,0.05)', borderRadius: 12, fontSize: '0.9rem' }}><strong>Explanation:</strong> {aiChallenge.explanation}<button onClick={() => setAiChallenge(null)} style={{ width: '100%', marginTop: 20, padding: 12, borderRadius: 10, border: 'none', background: C.border, color: C.text, fontWeight: 800, cursor: 'pointer' }}>NEXT CHALLENGE</button></div>)}</div>)}</div>)}
                        {activeTab === 'leaderboard' && (
                            <div style={{ width: '100%', maxWidth: 800, margin: '0 auto', ...cardStyle }}>
                                <div style={{ textAlign:'center', marginBottom:32 }}>
                                    <h2 style={{ fontFamily: 'Orbitron', margin:'0 0 8px' }}>Global Leaderboard</h2>
                                    <p style={{ color:C.sub, fontWeight:800 }}>Real-time student rankings across Nexus Cloud</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                    {leaderboard.map((l, i) => (
                                        <div key={l.id} style={{ 
                                            display: 'flex', alignItems: 'center', padding: '16px 24px', borderRadius: 22, 
                                            background: l.isYou ? 'rgba(0,245,196,0.1)' : C.card, 
                                            border: l.isYou ? '1px solid #00f5c4' : `1px solid ${C.border}`,
                                            animation: 'slideIn 0.3s ease-out',
                                            boxShadow: l.rank <= 3 ? `0 0 20px ${i===0?'rgba(255,215,0,0.1)':(i===1?'rgba(192,192,192,0.1)':'rgba(205,127,50,0.1)')}` : 'none'
                                        }}>
                                            <div style={{ width: 40, fontWeight: 900, color: i === 0 ? '#ffd700' : (i === 1 ? '#c0c0c0' : (i === 2 ? '#cd7f32' : C.sub)), display:'flex', alignItems:'center', gap:4 }}>
                                                #{i+1}
                                                {l.isYou && rankDelta !== 0 && (
                                                    <span style={{ fontSize:'0.7rem', color: rankDelta === -1 ? '#00f5c4' : '#ff4d6d' }}>
                                                        {rankDelta === -1 ? '▲' : '▼'}
                                                    </span>
                                                )}
                                            </div>
                                            <div style={{ width: 44, height: 44, background: l.color, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, color: '#070b18', marginRight: 16 }}>{l.avatar}</div>
                                            <div style={{ flex: 1 }}>
                                                <div style={{ fontWeight: 800, fontSize: '1.1rem' }}>{l.name} {l.isYou && <span style={{fontSize:'0.6rem', padding:'2px 6px', background:'#00f5c4', color:'#070b18', borderRadius:10, marginLeft:5}}>YOU</span>}</div>
                                                <div style={{ fontSize:'0.7rem', color:C.sub, fontWeight:900 }}>{l.xp > 4000 ? 'LEGEND' : (l.xp > 3000 ? 'EXPERT' : 'LEARNER')}</div>
                                            </div>
                                            <div style={{ fontFamily: 'Orbitron', fontWeight: 900, color: '#00f5c4', textAlign:'right' }}>
                                                <div>{l.xp.toLocaleString()}</div>
                                                <div style={{fontSize:'0.6rem', color:C.sub}}>TOTAL XP</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'lab' && <NexusLab C={C} />}
                        {activeTab === 'community' && <NexusCommunity user={user} C={C} />}
                        {activeTab === 'settings' && (
                            <div style={{ maxWidth: 800, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 24 }}>
                                <div style={{ ...cardStyle, textAlign: 'center', position: 'relative' }}>
                                    {isEditingProfile ? (
                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            const formData = new FormData(e.target);
                                            const newName = formData.get('userName');
                                            const newAvatar = formData.get('userAvatar');
                                            const newGrade = formData.get('userGrade');
                                            const updatedUser = { ...user, name: newName, avatar: newAvatar, grade: newGrade };
                                            setUser(updatedUser);
                                            
                                            // Persistence Logic
                                            const allUsers = JSON.parse(localStorage.getItem('learnXP_users') || '[]');
                                            const idx = allUsers.findIndex(u => u.email === foundEmail);
                                            if (idx !== -1) {
                                                allUsers[idx].name = newName;
                                                allUsers[idx].grade = newGrade;
                                                localStorage.setItem('learnXP_users', JSON.stringify(allUsers));
                                            }
                                            
                                            setIsEditingProfile(false);
                                            showToast("Profile Updated! 🌟");
                                        }} style={{ display:'flex', flexDirection:'column', gap:15, maxWidth:300, margin:'0 auto' }}>
                                            <input name="userAvatar" defaultValue={user.avatar} maxLength="2" style={{ width:80, height:80, borderRadius:'50%', background:'linear-gradient(135deg, #00f5c4, #0086ff)', border:'none', color:'white', textAlign:'center', fontSize:'1.5rem', fontWeight:900, margin:'0 auto' }} />
                                            <input name="userName" defaultValue={user.name} placeholder="Username" style={{ padding:'12px', borderRadius:12, border:`1px solid ${C.border}`, background:'rgba(255,255,255,0.05)', color:C.text, textAlign:'center', fontWeight:700 }} />
                                            <input name="userGrade" defaultValue={user.grade} placeholder="Grade/Class" style={{ padding:'12px', borderRadius:12, border:`1px solid ${C.border}`, background:'rgba(255,255,255,0.05)', color:C.text, textAlign:'center', fontWeight:700 }} />
                                            <div style={{ display:'flex', gap:10 }}>
                                                <button type="submit" style={{ flex:1, padding:'10px', borderRadius:10, border:'none', background:'#00f5c4', color:'#070b18', fontWeight:900, cursor:'pointer' }}>SAVE</button>
                                                <button type="button" onClick={() => setIsEditingProfile(false)} style={{ flex:1, padding:'10px', borderRadius:10, border:`1px solid ${C.border}`, background:'transparent', color:C.sub, fontWeight:900, cursor:'pointer' }}>CANCEL</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <>
                                            <div style={{ position: 'relative', width: 120, height: 120, margin: '0 auto 16px' }}>
                                                <div style={{ width: '100%', height: '100%', borderRadius: '50%', background: 'linear-gradient(135deg, #00f5c4, #0086ff)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem', fontWeight: 900, color: '#070b18' }}>{user.avatar}</div>
                                                <button onClick={() => setIsEditingProfile(true)} style={{ position: 'absolute', bottom: 0, right: 0, width: 36, height: 36, borderRadius: '50%', background: '#fff', border: 'none', cursor: 'pointer', boxShadow: '0 4px 10px rgba(0,0,0,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>✏️</button>
                                            </div>
                                            <h2 style={{ fontSize: '1.8rem', margin: '0 0 4px', fontFamily: 'Orbitron' }}>{user.name}</h2>
                                            <p style={{ color: C.sub, fontWeight: 700, margin: 0 }}>Elite Explorer • {user.level} XP Rank</p>
                                        </>
                                    )}
                                    <p style={{ fontSize: '0.8rem', color: C.sub, marginTop: 12 }}>Joined March 2026</p>
                                </div>
                                <div style={cardStyle}><div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}><span>👤</span><h3 style={{ margin: 0 }}>Personal Information</h3></div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Full Name</label><div style={{ padding: '12px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 12, mt: 4, fontWeight: 700 }}>{user.name}</div></div><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Email Address</label><div style={{ padding: '12px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 12, mt: 4, fontWeight: 700 }}>{user.name.toLowerCase().replace(/\s+/g, '.') + "@nexus.ai"}</div></div><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Class / Grade</label><div style={{ padding: '12px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 12, mt: 4, fontWeight: 700 }}>Grade 11 - Science</div></div><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Country / Region</label><div style={{ padding: '12px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 12, mt: 4, fontWeight: 700 }}>India (IN)</div></div></div></div>
                                <div style={cardStyle}><div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}><span>🤝</span><h3 style={{ margin: 0 }}>Community</h3></div><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><div style={{ display: 'flex', alignItems: 'center' }}>{['PK', 'RM', 'SD', 'KP'].map((init, i) => (<div key={i} style={{ width: 40, height: 40, borderRadius: '50%', background: '#ff9a3c', marginLeft: i === 0 ? 0 : -15, border: `3px solid ${C.bg}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.8rem', fontWeight: 900, color: '#fff' }}>{init}</div>))}<div style={{ marginLeft: 15, fontSize: '0.9rem', fontWeight: 700, color: C.sub }}>+18 online</div></div><button style={{ padding: '10px 20px', borderRadius: 12, border: `1px solid #00f5c4`, background: 'rgba(0,245,196,0.1)', color: '#00f5c4', fontWeight: 800, cursor: 'pointer' }}>Add Friend</button></div></div>
                                <div style={cardStyle}><div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}><span>⚙️</span><h3 style={{ margin: 0 }}>Preferences</h3></div><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Interface Language</label><select style={{ width: '100%', padding: '12px 16px', background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.border}`, borderRadius: 12, color: C.text, fontWeight: 700, mt: 4 }}><option>English (US)</option><option>Hindi (IN)</option><option>Spanish (ES)</option></select></div><div><label style={{ fontSize: '0.7rem', fontWeight: 900, textTransform: 'uppercase', color: C.sub }}>Visual Theme</label><div style={{ display: 'flex', gap: 10, marginTop: 4 }}><button onClick={() => setTheme('light')} style={{ flex: 1, padding: 12, borderRadius: 10, background: theme === 'light' ? '#00f5c4' : 'rgba(255,255,255,0.05)', color: theme === 'light' ? '#070b18' : C.text, fontWeight: 800, border: 'none' }}>Light</button><button onClick={() => setTheme('dark')} style={{ flex: 1, padding: 12, borderRadius: 10, background: theme === 'dark' ? '#00f5c4' : 'rgba(255,255,255,0.05)', color: theme === 'dark' ? '#070b18' : C.text, fontWeight: 800, border: 'none' }}>Dark</button></div></div></div></div>
                                <div style={{ ...cardStyle, border: '1px solid rgba(255,77,109,0.2)' }}><div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}><span>🛡️</span><h3 style={{ margin: 0 }}>Security & Account</h3></div><div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}><button style={{ width: '100%', padding: 16, borderRadius: 12, background: 'rgba(255,255,255,0.05)', color: C.text, fontWeight: 700, textAlign: 'left', border: 'none' }}>Change Account Password</button><button onClick={() => setIsLoggedIn(false)} style={{ width: '100%', padding: 16, borderRadius: 12, background: 'rgba(0,134,255,0.1)', color: '#0086ff', fontWeight: 800, textAlign: 'center', border: 'none', cursor: 'pointer' }}>Logout</button><button style={{ width: '100%', padding: 16, borderRadius: 12, background: 'rgba(255,77,109,0.05)', color: '#ff4d6d', fontWeight: 700, fontSize: '0.8rem', textAlign: 'center', border: 'none', border: '1px dashed rgba(255,77,109,0.3)' }}>Delete Account Permenantly</button></div></div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
